storage:
  data_dir: ./data
  segment_max_records: 1000000
  segment_max_bytes: 536870912
  index_cache_size: 32

ingest:
  batch_size: 1000
  batch_timeout: 100ms
  queue_size: 100000

api:
  http_addr: ":8080"
  grpc_addr: ":4317"   # OTLP/gRPC (стандартный порт OTel), оставить пустым чтобы отключить
  read_timeout: 30s
  write_timeout: 30s
  api_key: ""          # Bearer token, пусто = auth выключен

log:
  level: info
  format: text

retention:
  interval: 1h           # интервал проверки (общий для logs и spans)

  # Per-stream retention. Каждая секция имеет два tier'а:
  #   local_*  — снимает файл с локального диска, объект в S3 остаётся.
  #              Требует настроенного storage.s3. Запрос в эвиктнутый
  #              сегмент прозрачно подтянет его обратно.
  #   max_*    — удаляет сегмент глобально (и из S3). Compliance retention.
  # Все значения 0 = соответствующий tier отключён.
  logs:
    local_max_age: 0s    # пример: 168h (7 дней) — после этого только в S3
    local_max_bytes: 0
    max_age: 0s          # пример: 8760h (год)
    max_bytes: 0
    max_segments: 0

  spans:
    local_max_age: 0s
    local_max_bytes: 0
    max_age: 0s          # обычно короче чем у logs
    max_bytes: 0
    max_segments: 0
